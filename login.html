<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link rel="stylesheet" href="css/style.css">

<style>
.login-box{
width:350px;
max-width:95%;
margin:80px auto;
background:#1e293b;
padding:30px;
border-radius:15px;
text-align:center;
}

.login-box h2{
margin-bottom:20px;
color:#ffd700;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:15px;
background:#16a34a;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#15803d;
}

#msg{
margin-top:15px;
color:#ff4d4d;
}
</style>

</head>

<body>

<div class="login-box">

<h2>🔐 Admin Login</h2>

<input type="email" id="email" placeholder="Admin Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
