<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<style>

.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#1e293b;
}

.logout{
background:#dc2626;
padding:10px 20px;
color:#fff;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin:30px;
}

.stat{
background:#1e293b;
padding:25px;
border-radius:12px;
text-align:center;
}

.stat h2{
font-size:34px;
margin-bottom:10px;
color:#ffd700;
}

.actions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin:30px;
}

.action{
background:#2563eb;
padding:20px;
text-decoration:none;
color:#fff;
text-align:center;
font-size:18px;
font-weight:bold;
border-radius:12px;
transition:.3s;
}

.action:hover{
background:#1d4ed8;
transform:translateY(-3px);
}

</style>

</head>

<body>

<div class="top">

<h2>🏆 Admin Dashboard</h2>

<a href="login.html" class="logout">Logout</a>

</div>

<div class="stats">

<div class="stat">
<h2 id="groupCount">0</h2>
<p>Total Groups</p>
</div>

<div class="stat">
<h2 id="teamCount">0</h2>
<p>Total Teams</p>
</div>

<div class="stat">
<h2 id="matchCount">0</h2>
<p>Total Matches</p>
</div>

</div>

<div class="actions">

<a class="action" href="groups.html">➕ Add Group</a>

<a class="action" href="teams.html">👥 Add Team</a>

<a class="action" href="fixtures.html">⚽ Fixtures</a>

<a class="action" href="points.html">📊 Points Table</a>

<a class="action" href="results.html">📝 Results</a>

</div>

</body>
</html>
